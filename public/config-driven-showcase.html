<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Config-Driven 架構設計思維 - 互動展示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap");

      body {
        font-family: "Noto Sans TC", sans-serif;
      }

      .gradient-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }

      .gradient-problem {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      }

      .gradient-solution {
        background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      }

      .card {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .card:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
      }

      .problem-card {
        background: linear-gradient(
          135deg,
          rgba(240, 147, 251, 0.1) 0%,
          rgba(245, 87, 108, 0.1) 100%
        );
        border-left: 4px solid #f5576c;
      }

      .solution-card {
        background: linear-gradient(
          135deg,
          rgba(79, 172, 254, 0.1) 0%,
          rgba(0, 242, 254, 0.1) 100%
        );
        border-left: 4px solid #00f2fe;
      }

      .interactive-demo {
        border: 2px dashed #cbd5e1;
        background: #f8fafc;
        position: relative;
      }

      .interactive-demo::before {
        content: "互動式展示";
        position: absolute;
        top: -12px;
        left: 20px;
        background: #667eea;
        color: white;
        padding: 4px 12px;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 600;
      }

      .before-after-slider {
        position: relative;
        overflow: hidden;
      }

      .comparison-label {
        position: absolute;
        top: 10px;
        padding: 6px 12px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 600;
        z-index: 10;
      }

      .label-before {
        left: 10px;
        background: #f5576c;
      }
      .label-after {
        right: 10px;
        background: #00f2fe;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-in {
        animation: fadeInUp 0.6s ease-out forwards;
      }

      .step-number {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 1.25rem;
      }

      .code-block {
        background: #1e293b;
        border-radius: 8px;
        padding: 1.5rem;
        overflow-x: auto;
        color: #e2e8f0;
        font-family: "Monaco", "Menlo", monospace;
        font-size: 0.875rem;
        line-height: 1.6;
      }

      .highlight-box {
        border: 2px solid #fbbf24;
        background: rgba(251, 191, 36, 0.1);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.6;
        }
      }

      .tab-active {
        border-bottom: 3px solid #667eea;
        color: #667eea;
        font-weight: 600;
      }

      .field-preview {
        background: white;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        padding: 1rem;
        margin: 0.5rem 0;
        transition: all 0.3s;
      }

      .field-preview:hover {
        border-color: #667eea;
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
      }
    </style>
  </head>
  <body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      function App() {
          const [activeTab, setActiveTab] = useState('problem');
          const [currentRole, setCurrentRole] = useState('supplier');
          const [isAnimating, setIsAnimating] = useState(false);

          // 模擬配置驅動
          const fieldConfigs = [
              {
                  id: 'amount',
                  label: '申請金額',
                  visibleFor: ['supplier', 'approver', 'finance'],
                  editableFor: ['supplier']
              },
              {
                  id: 'description',
                  label: '商品說明',
                  visibleFor: ['supplier', 'approver', 'finance'],
                  editableFor: ['supplier']
              },
              {
                  id: 'approverComment',
                  label: '審核人意見',
                  visibleFor: ['approver', 'finance'],
                  editableFor: ['approver']
              }
          ];

          const roles = [
              { id: 'supplier', name: '供應商', color: 'bg-blue-500' },
              { id: 'approver', name: '審核人', color: 'bg-purple-500' },
              { id: 'finance', name: '財務', color: 'bg-green-500' }
          ];

          const toggleRole = () => {
              setIsAnimating(true);
              const currentIndex = roles.findIndex(r => r.id === currentRole);
              const nextIndex = (currentIndex + 1) % roles.length;
              setTimeout(() => {
                  setCurrentRole(roles[nextIndex].id);
                  setIsAnimating(false);
              }, 300);
          };

          return (
              <div className="min-h-screen">
                  {/* Header */}
                  <header className="gradient-primary text-white py-16">
                      <div className="container mx-auto px-4">
                          <div className="max-w-4xl mx-auto text-center">
                              <div className="inline-block bg-white/20 backdrop-blur-sm px-4 py-2 rounded-full mb-4">
                                  <span className="text-sm font-medium">架構設計 • 問題解決</span>
                              </div>
                              <h1 className="text-5xl font-black mb-4">Config-Driven Architecture</h1>
                              <p className="text-xl text-white/90 mb-8">從混亂的條件判斷，到優雅的配置驅動設計</p>
                              <div className="flex justify-center gap-4">
                                  <div className="bg-white/10 backdrop-blur-sm px-6 py-3 rounded-lg">
                                      <div className="text-sm opacity-80">問題規模</div>
                                      <div className="text-2xl font-bold">100+ 條件</div>
                                  </div>
                                  <div className="bg-white/10 backdrop-blur-sm px-6 py-3 rounded-lg">
                                      <div className="text-sm opacity-80">程式碼減少</div>
                                      <div className="text-2xl font-bold">70%</div>
                                  </div>
                                  <div className="bg-white/10 backdrop-blur-sm px-6 py-3 rounded-lg">
                                      <div className="text-sm opacity-80">維護成本</div>
                                      <div className="text-2xl font-bold">-80%</div>
                                  </div>
                              </div>
                          </div>
                      </div>
                  </header>

                  {/* Navigation Tabs */}
                  <div className="bg-white border-b sticky top-0 z-50 shadow-sm">
                      <div className="container mx-auto px-4">
                          <div className="flex justify-center gap-8 py-4">
                              {[
                                  { id: 'problem', label: '遇到的問題', icon: '🤯' },
                                  { id: 'solution', label: '設計思路', icon: '💡' },
                                  { id: 'demo', label: '互動展示', icon: '🎯' },
                                  { id: 'benefits', label: '帶來的價值', icon: '🚀' }
                              ].map(tab => (
                                  <button
                                      key={tab.id}
                                      onClick={() => setActiveTab(tab.id)}
                                      className={`px-6 py-3 text-sm font-medium transition-all ${
                                          activeTab === tab.id ? 'tab-active' : 'text-gray-600 hover:text-gray-900'
                                      }`}
                                  >
                                      <span className="mr-2">{tab.icon}</span>
                                      {tab.label}
                                  </button>
                              ))}
                          </div>
                      </div>
                  </div>

                  {/* Content */}
                  <div className="container mx-auto px-4 py-16">
                      {/* Problem Section */}
                      {activeTab === 'problem' && (
                          <div className="max-w-6xl mx-auto space-y-8 animate-in">
                              <div className="text-center mb-12">
                                  <h2 className="text-4xl font-black mb-4">🤯 我們遇到了什麼問題？</h2>
                                  <p className="text-gray-600 text-lg">多角色權限控制下的表單渲染困境</p>
                              </div>

                              <div className="grid md:grid-cols-2 gap-8">
                                  <div className="problem-card card p-8 rounded-xl">
                                      <div className="text-3xl mb-4">🔥</div>
                                      <h3 className="text-xl font-bold mb-4">問題一：條件判斷爆炸</h3>
                                      <p className="text-gray-700 mb-4">每個欄位都需要根據角色判斷「是否顯示」、「是否可編輯」</p>
                                      <div className="bg-red-50 border border-red-200 rounded-lg p-4 text-sm">
                                          <div className="font-mono text-red-700">
                                              if (role === 'supplier') {'{'}<br/>
                                              &nbsp;&nbsp;if (status === 'draft') {'{'}<br/>
                                              &nbsp;&nbsp;&nbsp;&nbsp;show field A<br/>
                                              &nbsp;&nbsp;{'}'}<br/>
                                              {'}'} else if (role === 'approver') {'{'}<br/>
                                              &nbsp;&nbsp;if (field === 'comment') {'{'}<br/>
                                              &nbsp;&nbsp;&nbsp;&nbsp;enable editing<br/>
                                              &nbsp;&nbsp;{'}'}<br/>
                                              {'}'}
                                          </div>
                                          <div className="mt-3 text-red-600 font-bold">❌ 100+ 個 if-else 散落各處</div>
                                      </div>
                                  </div>

                                  <div className="problem-card card p-8 rounded-xl">
                                      <div className="text-3xl mb-4">😰</div>
                                      <h3 className="text-xl font-bold mb-4">問題二：維護噩夢</h3>
                                      <p className="text-gray-700 mb-4">新增角色或修改權限需要改動多處程式碼</p>
                                      <ul className="space-y-2 text-sm text-gray-600">
                                          <li className="flex items-start gap-2">
                                              <span className="text-red-500 font-bold">•</span>
                                              <span>每個組件都有自己的權限邏輯</span>
                                          </li>
                                          <li className="flex items-start gap-2">
                                              <span className="text-red-500 font-bold">•</span>
                                              <span>測試時需要手動切換 10+ 種場景</span>
                                          </li>
                                          <li className="flex items-start gap-2">
                                              <span className="text-red-500 font-bold">•</span>
                                              <span>新人無法快速理解整體邏輯</span>
                                          </li>
                                          <li className="flex items-start gap-2">
                                              <span className="text-red-500 font-bold">•</span>
                                              <span>改一個地方容易漏改其他地方</span>
                                          </li>
                                      </ul>
                                  </div>

                                  <div className="problem-card card p-8 rounded-xl">
                                      <div className="text-3xl mb-4">🐛</div>
                                      <h3 className="text-xl font-bold mb-4">問題三：容易出錯</h3>
                                      <p className="text-gray-700 mb-4">重複的邏輯導致不一致的行為</p>
                                      <div className="space-y-2">
                                          <div className="bg-yellow-50 border border-yellow-300 rounded p-3 text-sm">
                                              <span className="font-bold text-yellow-700">場景：</span> 同一個欄位在列表頁可見，在詳情頁卻隱藏了
                                          </div>
                                          <div className="bg-yellow-50 border border-yellow-300 rounded p-3 text-sm">
                                              <span className="font-bold text-yellow-700">場景：</span> 財務角色在某些狀態下應該唯讀，但忘記加判斷
                                          </div>
                                      </div>
                                  </div>

                                  <div className="problem-card card p-8 rounded-xl">
                                      <div className="text-3xl mb-4">📈</div>
                                      <h3 className="text-xl font-bold mb-4">問題四：無法擴展</h3>
                                      <p className="text-gray-700 mb-4">業務成長時程式碼複雜度指數增長</p>
                                      <div className="bg-white rounded-lg p-4 border-2 border-red-300">
                                          <div className="text-sm text-gray-600 mb-2">複雜度增長公式：</div>
                                          <div className="font-mono text-lg font-bold text-red-600">
                                              條件數 = 欄位數 × 角色數 × 狀態數
                                          </div>
                                          <div className="mt-3 text-sm text-gray-500">
                                              實際案例：30 欄位 × 4 角色 × 3 狀態 = <span className="text-red-600 font-bold">360 個判斷</span>
                                          </div>
                                      </div>
                                  </div>
                              </div>
                          </div>
                      )}

                      {/* Solution Section */}
                      {activeTab === 'solution' && (
                          <div className="max-w-6xl mx-auto space-y-12 animate-in">
                              <div className="text-center mb-12">
                                  <h2 className="text-4xl font-black mb-4">💡 Config-Driven 設計思路</h2>
                                  <p className="text-gray-600 text-lg">將散落的邏輯集中到配置檔案，讓程式碼變得簡潔優雅</p>
                              </div>

                              {/* Step 1 */}
                              <div className="solution-card card p-8 rounded-xl">
                                  <div className="flex items-start gap-6">
                                      <div className="step-number bg-blue-500 text-white shrink-0">1</div>
                                      <div className="flex-1">
                                          <h3 className="text-2xl font-bold mb-4">核心概念：單一數據源</h3>
                                          <p className="text-gray-700 mb-6">將所有欄位的「邏輯」與「配置」統一定義在一個地方</p>

                                          <div className="grid md:grid-cols-2 gap-6">
                                              <div className="bg-white rounded-lg p-4 border-2">
                                                  <div className="text-sm font-bold text-gray-500 mb-2">❌ 傳統做法</div>
                                                  <div className="text-xs font-mono bg-gray-50 p-3 rounded">
                                                      組件 A → if (role === 'supplier')<br/>
                                                      組件 B → if (role === 'supplier')<br/>
                                                      組件 C → if (role === 'supplier')<br/>
                                                      <div className="text-red-600 mt-2">重複 100+ 次</div>
                                                  </div>
                                              </div>
                                              <div className="bg-white rounded-lg p-4 border-2 border-blue-500">
                                                  <div className="text-sm font-bold text-blue-600 mb-2">✅ Config-Driven</div>
                                                  <div className="text-xs font-mono bg-blue-50 p-3 rounded">
                                                      Config 檔案：<br/>
                                                      getDisabled: (role) => role !== 'supplier'<br/>
                                                      <br/>
                                                      所有組件共用這個邏輯 ↑
                                                  </div>
                                              </div>
                                          </div>
                                      </div>
                                  </div>
                              </div>

                              {/* Step 2 */}
                              <div className="solution-card card p-8 rounded-xl">
                                  <div className="flex items-start gap-6">
                                      <div className="step-number bg-purple-500 text-white shrink-0">2</div>
                                      <div className="flex-1">
                                          <h3 className="text-2xl font-bold mb-4">設計模式：函數式配置</h3>
                                          <p className="text-gray-700 mb-6">用函數替代硬編碼，讓配置具備靈活性</p>

                                          <div className="bg-gradient-to-br from-purple-50 to-blue-50 rounded-xl p-6 border-2 border-purple-200">
                                              <div className="text-sm font-bold mb-3">實際配置範例：</div>
                                              <div className="bg-white rounded-lg p-4 font-mono text-sm">
                                                  <div className="text-gray-600">{'{'}</div>
                                                  <div className="ml-4 text-blue-600">id: <span className="text-green-600">"amount"</span>,</div>
                                                  <div className="ml-4 text-blue-600">label: <span className="text-green-600">"申請金額"</span>,</div>
                                                  <div className="ml-4 text-purple-600 font-bold">
                                                      getDisabled: <span className="text-orange-600">(role)</span> => role !== <span className="text-green-600">'supplier'</span>,
                                                  </div>
                                                  <div className="ml-4 text-purple-600 font-bold">
                                                      getVisible: <span className="text-orange-600">(role)</span> => <span className="text-blue-600">true</span>
                                                  </div>
                                                  <div className="text-gray-600">{'}'}</div>
                                              </div>
                                              <div className="mt-4 flex items-start gap-3 bg-white rounded-lg p-4">
                                                  <span className="text-2xl">💡</span>
                                                  <div className="text-sm text-gray-700">
                                                      <span className="font-bold">關鍵優勢：</span>
                                                      新增「財務也可編輯」只需改這一行，不用搜尋整個專案
                                                  </div>
                                              </div>
                                          </div>
                                      </div>
                                  </div>
                              </div>

                              {/* Step 3 */}
                              <div className="solution-card card p-8 rounded-xl">
                                  <div className="flex items-start gap-6">
                                      <div className="step-number bg-green-500 text-white shrink-0">3</div>
                                      <div className="flex-1">
                                          <h3 className="text-2xl font-bold mb-4">實現方式：動態渲染引擎</h3>
                                          <p className="text-gray-700 mb-6">一個通用的渲染函數，根據配置自動生成 UI</p>

                                          <div className="grid md:grid-cols-3 gap-4">
                                              <div className="bg-white rounded-lg p-4 border-2 text-center">
                                                  <div className="text-3xl mb-2">📋</div>
                                                  <div className="font-bold text-sm mb-2">讀取配置</div>
                                                  <div className="text-xs text-gray-600">從 Config 陣列取得所有欄位定義</div>
                                              </div>
                                              <div className="bg-white rounded-lg p-4 border-2 text-center">
                                                  <div className="text-3xl mb-2">🔍</div>
                                                  <div className="font-bold text-sm mb-2">執行函數</div>
                                                  <div className="text-xs text-gray-600">呼叫 getVisible、getDisabled 取得當前狀態</div>
                                              </div>
                                              <div className="bg-white rounded-lg p-4 border-2 text-center">
                                                  <div className="text-3xl mb-2">🎨</div>
                                                  <div className="font-bold text-sm mb-2">渲染組件</div>
                                                  <div className="text-xs text-gray-600">動態載入對應組件並套用屬性</div>
                                              </div>
                                          </div>

                                          <div className="mt-6 bg-green-50 border-2 border-green-300 rounded-lg p-4">
                                              <div className="font-bold text-green-700 mb-2">🎯 核心概念：</div>
                                              <div className="text-sm text-gray-700">
                                                  組件不再關心「我該不該顯示」、「我能不能編輯」，<br/>
                                                  只需要專注「如何漂亮地渲染」，所有邏輯由配置驅動
                                              </div>
                                          </div>
                                      </div>
                                  </div>
                              </div>
                          </div>
                      )}

                      {/* Interactive Demo Section */}
                      {activeTab === 'demo' && (
                          <div className="max-w-6xl mx-auto space-y-8 animate-in">
                              <div className="text-center mb-12">
                                  <h2 className="text-4xl font-black mb-4">🎮 互動展示：看設計如何運作</h2>
                                  <p className="text-gray-600 text-lg">切換角色，立即看到不同的畫面呈現</p>
                              </div>

                              {/* Role Switcher */}
                              <div className="bg-white rounded-xl shadow-lg p-6 border-2">
                                  <div className="flex items-center justify-between mb-6">
                                      <div>
                                          <h3 className="text-xl font-bold mb-2">當前測試角色</h3>
                                          <p className="text-sm text-gray-600">同一份配置，根據角色自動調整 UI</p>
                                      </div>
                                      <button
                                          onClick={toggleRole}
                                          className="bg-gradient-to-r from-blue-500 to-purple-500 text-white px-8 py-3 rounded-lg font-bold hover:shadow-lg transition-all"
                                      >
                                          🔄 切換角色
                                      </button>
                                  </div>

                                  <div className="grid grid-cols-3 gap-4">
                                      {roles.map(role => (
                                          <div
                                              key={role.id}
                                              className={`p-4 rounded-lg border-2 transition-all ${
                                                  currentRole === role.id
                                                      ? 'border-blue-500 bg-blue-50 scale-105'
                                                      : 'border-gray-200 bg-white'
                                              }`}
                                          >
                                              <div className={`w-12 h-12 ${role.color} rounded-full mx-auto mb-3 flex items-center justify-center text-2xl text-white`}>
                                                  {role.id === 'supplier' ? '🏢' : role.id === 'approver' ? '✅' : '💰'}
                                              </div>
                                              <div className="text-center font-bold">{role.name}</div>
                                              {currentRole === role.id && (
                                                  <div className="text-center text-xs text-blue-600 font-medium mt-2">← 當前角色</div>
                                              )}
                                          </div>
                                      ))}
                                  </div>
                              </div>

                              {/* Live Preview */}
                              <div className={`interactive-demo rounded-xl p-8 transition-all duration-300 ${isAnimating ? 'opacity-50' : 'opacity-100'}`}>
                                  <div className="bg-white rounded-lg p-6 shadow-inner">
                                      <h4 className="text-lg font-bold mb-6 text-gray-700">支付申請表單（即時預覽）</h4>

                                      <div className="space-y-4">
                                          {fieldConfigs.map(field => {
                                              const isVisible = field.visibleFor.includes(currentRole);
                                              const isEditable = field.editableFor.includes(currentRole);

                                              if (!isVisible) return null;

                                              return (
                                                  <div key={field.id} className="field-preview">
                                                      <div className="flex items-center justify-between mb-2">
                                                          <label className="font-medium text-gray-700">{field.label}</label>
                                                          <div className="flex gap-2">
                                                              {isVisible && (
                                                                  <span className="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">✓ 可見</span>
                                                              )}
                                                              {!isEditable && (
                                                                  <span className="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded">🔒 唯讀</span>
                                                              )}
                                                          </div>
                                                      </div>
                                                      <input
                                                          type="text"
                                                          className={`w-full p-3 border-2 rounded-lg ${
                                                              isEditable
                                                                  ? 'border-blue-300 bg-white'
                                                                  : 'border-gray-200 bg-gray-50'

                                                  </div>
